name: Terraform Drift Detection

on:
  schedule:
    - cron: '*/5 * * * *' # Every 5 minutes
  workflow_dispatch:

env:
  TF_VERSION: "1.10.5"
  AWS_REGION: "us-west-2"
  TF_DIR: "./infra"

jobs:
  drift_detection:
    name: Drift Detection (dev)
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Ensure infra/tmp exists
        run: mkdir -p infra/tmp

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            backend/package-lock.json

      - name: Build deployment artifacts
        run: npm run deploy:prepare

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_CI_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform init
        working-directory: ${{ env.TF_DIR }}
        run: terraform init

      - name: Select dev workspace
        working-directory: ${{ env.TF_DIR }}
        run: terraform workspace select dev || terraform workspace new dev

      - name: Terraform drift check
        id: drift
        working-directory: ${{ env.TF_DIR }}
        shell: bash
        env:
          TF_VAR_runtime_secret_value: ${{ secrets.TICKETFLOW_RUNTIME_SECRET }}
        run: |
          set +e
          echo "## Drift check working dir: $(pwd)"
          echo "## Listing infra contents"
          ls -la
          echo "## Listing current directory contents"
          ls -la .

          terraform plan \
            -detailed-exitcode \
            -var-file=envs/dev/dev.tfvars \
            -no-color \
            | tee plan.txt

          EXIT_CODE=${PIPESTATUS[0]}
          echo "Terraform exit code: $EXIT_CODE"

          {
            echo "## Terraform Drift Detection (dev)"
            echo ""
            echo "Workspace: dev"
            echo ""
            echo '```'
            cat plan.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$EXIT_CODE" -eq 2 ]; then
            echo "Infrastructure drift detected."
            exit 1
          fi

          exit "$EXIT_CODE"
