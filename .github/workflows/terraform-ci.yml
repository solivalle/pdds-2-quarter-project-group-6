name: Terraform CICD

on:
  push:
    branches: [main]
    paths: 
      - 'infra/**'
      - 'backend/**'
      - 'frontend/**'
      - 'package.json'
      - '.github/workflows/terraform-ci.yml'
  pull_request:
    branches: [main]
    paths: 
      - 'infra/**'
      - 'backend/**'
      - 'frontend/**'
      - 'package.json'
      - '.github/workflows/terraform-ci.yml'

env:
  TF_VERSION: "1.10.5"
  AWS_REGION: "us-west-2"
  TF_DIR: "./infra"

jobs:
  terraform_fmt:
    name: Terraform fmt
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref == 'refs/heads/main')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            backend/package-lock.json

      - name: Build deployment artifacts
        run: npm run deploy:prepare

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform fmt
        run: terraform fmt --check -recursive
        working-directory: infra

  terraform_validate:
    name: Terraform validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    needs: terraform_fmt

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Ensure infra/tmp exists
        run: mkdir -p infra/tmp

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            backend/package-lock.json

      - name: Build deployment artifacts
        run: npm run deploy:prepare

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS Credentials
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_CI_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Terraform init without backend
        if: github.event_name == 'pull_request'
        run: terraform init -backend=false
        working-directory: infra

      - name: Terraform init
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: terraform init
        working-directory: infra

      - name: Select dev workspace
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: terraform workspace select dev || terraform workspace new dev
        working-directory: infra

      - name: Terraform validate
        run: terraform validate
        working-directory: infra

  terraform_plan_pr:
    name: Terraform plan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: terraform_validate

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Ensure infra/tmp exists
        run: mkdir -p infra/tmp

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            backend/package-lock.json

      - name: Build deployment artifacts
        run: npm run deploy:prepare

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_CI_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Terraform init
        run: terraform init
        working-directory: infra

      - name: Select dev workspace
        run: terraform workspace select dev || terraform workspace new dev
        working-directory: infra

      - name: Terraform plan
        env:
          TF_VAR_runtime_secret_value: ${{ secrets.TICKETFLOW_RUNTIME_SECRET }}
        run: terraform plan -out=tfplan-dev -var-file=envs/dev/dev.tfvars -no-color
        working-directory: infra

      - name: Save plan output
        run: terraform show -no-color tfplan-dev | tee plan.txt
        working-directory: infra

      - name: Upload tfplan-dev artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-dev
          path: infra/tfplan-dev

      - name: Upload project.zip artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: project-zip
          path: infra/tmp/project.zip

  dev_apply:
    name: Dev apply
    needs: terraform_plan_pr
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: dev
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Ensure infra/tmp exists
        run: mkdir -p infra/tmp

      - name: Download tfplan-dev artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-dev
          path: infra

      - name: Download project.zip artifact
        uses: actions/download-artifact@v4
        with:
          name: project-zip
          path: infra/tmp

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            backend/package-lock.json

      - name: Build deployment artifacts
        run: npm run deploy:prepare

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_CI_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform init
        run: terraform init
        working-directory: infra

      - name: Select dev workspace
        run: terraform workspace select dev || terraform workspace new dev
        working-directory: infra

      # Delivery demo deployment is intentionally disabled for now.
      # disabling after live demo
      # - name: Terraform apply
      #   run: terraform apply -auto-approve tfplan-dev
      #   working-directory: infra

      # - name: Terraform destroy
      #   run: terraform destroy -var-file=envs/dev/dev.tfvars -auto-approve
      #   working-directory: infra

  validate_prod:
    name: Validate prod plan
    needs: dev_apply
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Ensure infra/tmp exists
        run: mkdir -p infra/tmp

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            backend/package-lock.json

      - name: Build deployment artifacts
        run: npm run deploy:prepare

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_CI_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform init
        run: terraform init
        working-directory: infra

      - name: Select prod workspace
        run: terraform workspace select prod || terraform workspace new prod
        working-directory: infra

      - name: Terraform plan
        env:
          TF_VAR_runtime_secret_value: ${{ secrets.TICKETFLOW_RUNTIME_SECRET }}
        run: |
          terraform plan -out=tfplan-prod \
            -var-file=envs/prod/prod.tfvars -no-color
        working-directory: infra

      - name: Upload tfplan-prod artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-prod
          path: infra/tfplan-prod

      - name: Upload project.zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: project-zip
          path: infra/tmp/project.zip

  prod_apply:
    name: Prod apply
    needs: validate_prod
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: prod
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Ensure infra/tmp exists
        run: mkdir -p infra/tmp

      - name: Download tfplan-prod artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-prod
          path: infra

      - name: Download project.zip artifact
        uses: actions/download-artifact@v4
        with:
          name: project-zip
          path: infra/tmp

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            backend/package-lock.json

      - name: Build deployment artifacts
        run: npm run deploy:prepare

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_CI_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform init
        run: terraform init
        working-directory: infra

      - name: Select prod workspace
        run: terraform workspace select prod || terraform workspace new prod
        working-directory: infra

      # Delivery demo deployment is intentionally disabled for now.
      # - name: Terraform apply
      #   run: terraform apply -auto-approve tfplan-prod
      #   working-directory: infra

      # - name: Terraform destroy
      #   run: terraform destroy -var-file=envs/prod/prod.tfvars -auto-approve
      #   working-directory: infra
