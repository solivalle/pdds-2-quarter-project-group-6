name: Terraform CICD

on:
  push:
    branches: [main]
    paths: 
      - 'infra/**'
      - 'backend/**'
      - '.github/workflows/terraform-ci.yml'
  pull_request:
    branches: [main]
    paths: 
      - 'infra/**'
      - 'backend/**'
      - '.github/workflows/terraform-ci.yml'

env:
  TF_VERSION: "1.10.5"
  AWS_REGION: "us-west-2"
  TF_DIR: "./infra"

jobs:
  terraform_fmt:
    name: Terraform fmt
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Build backend artifact
        working-directory: backend
        run: |
          npm ci
          npm run build

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.8"

      - name: Terraform fmt
        run: terraform fmt --check -recursive
        working-directory: infra

  terraform_validate:
    name: Terraform validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    if: github.event_name == 'pull_request'
    needs: terraform_fmt

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Build backend artifact
        working-directory: backend
        run: |
          npm ci
          npm run build

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.8"

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Terraform init
        run: terraform init
        working-directory: infra

      - name: Terraform validate
        run: terraform validate
        working-directory: infra

  terraform_plan_pr:
    name: Terraform plan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    if: github.event_name == 'pull_request'
    needs: terraform_validate

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Build backend artifact
        working-directory: backend
        run: |
          npm ci
          npm run build

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.8"

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Terraform init
        run: terraform init
        working-directory: infra

      - name: Terraform plan
        run: terraform plan -out=tfplan-dev -var-file=envs/dev/dev.tfvars -no-color
        working-directory: infra

      - name: Save plan output
        run: terraform show -no-color tfplan-dev | tee plan.txt
        working-directory: infra

      - name: Upload tfplan-dev artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-dev
          path: infra/tfplan-dev

      - name: Post plan as PR comment
        uses: actions/github-script@v7
        continue-on-error: true
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('infra/plan.txt', 'utf8');

            github.rest.issues.createComment({
              ...context.repo,
              issue_number: context.issue.number,
              body: `<details><summary>Terraform Plan</
              summary>\n\n\`\`\`\\\n${plan}\n\`\`\`\n</details>`
            });

  dev_apply:
    name: Dev apply
    needs: terraform_plan_pr
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: dev
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Download tfplan-dev artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-dev
          path: infra

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Build backend artifact
        working-directory: backend
        run: |
          npm ci
          npm run build

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform init
        run: terraform init
        working-directory: infra

      - name: Terraform apply
        run: terraform apply -auto-approve tfplan-dev
        working-directory: infra

      - name: Terraform destroy
        run: terraform destroy -var-file=envs/dev/dev.tfvars -auto-approve
        working-directory: infra

  validate_prod:
    name: Validate prod plan
    needs: dev_apply
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Build backend artifact
        working-directory: backend
        run: |
          npm ci
          npm run build

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform init
        run: terraform init
        working-directory: infra

      - name: Terraform plan
        run: |
          terraform plan -out=tfplan-prod \
            -var-file=envs/prod/prod.tfvars -no-color
        working-directory: infra

      - name: Upload tfplan-prod artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-prod
          path: infra/tfplan-prod

  prod_apply:
    name: Prod apply
    needs: validate_prod
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: prod
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Download tfplan-prod artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-prod
          path: infra

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Build backend artifact
        working-directory: backend
        run: |
          npm ci
          npm run build

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform init
        run: terraform init
        working-directory: infra

      - name: Terraform apply
        run: terraform apply tfplan-prod
        working-directory: infra

      - name: Terraform destroy
        run: terraform destroy -var-file=envs/prod/prod.tfvars -auto-approve
        working-directory: infra
